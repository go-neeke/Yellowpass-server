name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 178.128.24.24
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Schoolpass-server
            ./deploy.sh
