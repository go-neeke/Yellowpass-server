<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SchoolPass 로그인</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            cursor: pointer;
        }

        .signup {
            margin-top: 10px;
            background: #eee;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>관리자 로그인</h2>

    <input id="username" placeholder="아이디">
    <input id="password" type="password" placeholder="비밀번호">

    <button onclick="login()">로그인</button>

    <button class="signup" onclick="location.href='/signup.html'">
        회원가입
    </button>
</div>

<script>
    async function login() {
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            if (!res.ok) {
                alert("로그인 실패");
                return;
            }

            const data = await res.json();

            // 핵심: schoolId 저장
            localStorage.setItem("schoolId", data.school.id);

            alert("로그인 성공");

            location.href = "/index.html";

        } catch (e) {
            console.error(e);
            alert("서버 오류");
        }
    }
</script>

</body>
</html>
