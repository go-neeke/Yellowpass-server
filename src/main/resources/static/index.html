<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>옐로패스 관리자</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f8f9fa;
        }

        h1 {
            margin-bottom: 20px;
        }

        .top-bar {
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f1f1f1;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>📋 학생 탑승 기록</h1>

<div class="top-bar">
    <input type="date" id="date">
    <button onclick="loadBoarding()">조회</button>
    <button onclick="logout()">로그아웃</button>
</div>

<table>
    <thead>
    <tr>
        <th>이름</th>
        <th>학년</th>
        <th>반</th>
        <th>차량</th>
        <th>탑승 시간</th>
    </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

<script>

    const schoolId = localStorage.getItem("schoolId");

    if (!schoolId) {
        location.href = "/login.html";
    }

    function logout() {
        localStorage.clear();
        location.href = "/login.html";
    }

    function formatTime(time) {
        const date = new Date(time);

        return date.toLocaleString("ko-KR", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    async function loadBoarding() {

        const date = document.getElementById("date").value;

        if (!date) {
            alert("날짜 선택하세요");
            return;
        }

        try {
            const res = await fetch(`/api/admin/boarding?schoolId=${schoolId}&date=${date}`);
            const data = await res.json();

            const table = document.getElementById("tableBody");
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = `<tr><td colspan="5">데이터 없음</td></tr>`;
                return;
            }

            data.forEach(item => {
                table.innerHTML += `
                    <tr>
                        <td>${item.studentName}</td>
                        <td>${item.grade}</td>
                        <td>${item.classNo}</td>
                        <td>${item.vehicleNo}</td>
                        <td>${formatTime(item.boardedAt)}</td>
                    </tr>
                `;
            });

        } catch (e) {
            console.error(e);
            alert("조회 실패");
        }
    }

    // 🔥 오늘 날짜 기본값
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;

    loadBoarding();

    // 🔥 3초 자동 갱신
    setInterval(loadBoarding, 3000);

</script>

</body>
</html>
