<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SchoolPass 관리자</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f8f9fa;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f1f1f1;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .refresh {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>📋 학생 탑승 목록</h1>

<button class="refresh" onclick="loadStudents()">새로고침</button>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>이름</th>
        <th>학년</th>
        <th>반</th>
        <th>QR 코드</th>
        <th>탑승 시간</th>
    </tr>
    </thead>

    <tbody id="studentTable">
    </tbody>
</table>

<script>
    function formatTime(time) {
        if (!time) return '';

        const date = new Date(time);

        return date.toLocaleString('ko-KR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    async function loadStudents() {
        try {
            const res = await fetch('/api/students?t=' + new Date().getTime());
            const data = await res.json();

            console.log("데이터:", data);

            const table = document.getElementById('studentTable');
            table.innerHTML = '';

            data.forEach(student => {
                const row = `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.grade}</td>
                        <td>${student.classNo}</td>
                        <td>${student.qrCode}</td>
                        <td>${formatTime(student.boardedAt)}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });

        } catch (e) {
            console.error("API 호출 실패:", e);
        }
    }

    // 최초 로딩
    loadStudents();

    // 3초마다 자동 새로고침
    setInterval(loadStudents, 3000);
</script>

</body>
</html>
