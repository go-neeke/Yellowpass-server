<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>회원가입</h2>

    <!-- 🔥 학교 선택 -->
    <select id="school"></select>

    <input id="username" placeholder="아이디">
    <input id="password" type="password" placeholder="비밀번호">

    <button onclick="signup()">가입하기</button>
</div>

<script>

    // 🔥 학교 목록 불러오기
    async function loadSchools() {
        const res = await fetch('/api/schools');
        const schools = await res.json();

        const select = document.getElementById('school');
        select.innerHTML = "";

        schools.forEach(s => {
            select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
    }

    async function signup() {

        const schoolId = document.getElementById('school').value;

        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                schoolId: schoolId
            })
        });

        if (!res.ok) {
            alert("가입 실패");
            return;
        }

        alert("가입 완료");
        location.href = "/login.html";
    }

    loadSchools();
</script>

</body>
</html>
